{% extends 'bookings/base.html' %}

{% block title %}Редактирование профиля{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm border-0">
            <div class="card-header bg-success text-white border-0 py-3">
                <h5 class="mb-0"><i class="bi bi-pencil me-2"></i>Редактирование профиля</h5>
            </div>
            <div class="card-body">
                <form method="post" enctype="multipart/form-data">
                    {% csrf_token %}
                    
                    <div class="mb-3">
                        <label class="form-label">Имя</label>
                        {{ form.first_name }}
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Фамилия</label>
                        {{ form.last_name }}
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        {{ form.email }}
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Телефон</label>
                        {{ form.phone }}
                    </div>
                    
                    <button type="submit" class="btn btn-success w-100">Сохранить изменения</button>
                    <a href="{% url 'profile' %}" class="btn btn-outline-secondary w-100 mt-2">Назад</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
