{% extends 'bookings/base.html' %}

{% block title %}Проверить бронь{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm border-0">
            <div class="card-header bg-success text-white text-center border-0 py-4">
                <i class="bi bi-search" style="font-size: 2.5rem;"></i>
                <h4 class="mb-0 mt-2">Проверить бронирование</h4>
            </div>
            <div class="card-body p-4">
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-4">
                        <label class="form-label fw-semibold">Код бронирования</label>
                        <input type="text" name="booking_code" class="form-control form-control-lg rounded-3" placeholder="Например: A1B2C3D4" required>
                        <div class="form-text text-muted mt-2">
                            <i class="bi bi-info-circle"></i> Код был отправлен вам на email и SMS после бронирования
                        </div>
                    </div>
                    <button type="submit" class="btn btn-success w-100 py-2 rounded-3">
                        <i class="bi bi-search"></i> Найти бронь
                    </button>
                </form>
            </div>
            <div class="card-footer bg-light text-center border-0">
                <small class="text-muted">
                    <i class="bi bi-question-circle"></i> Не нашли код? Позвоните нам: +7 (999) 123-45-67
                </small>
            </div>
        </div>
        
        <div class="text-center mt-4" style="margin-bottom: 20px;">
            <div class="row g-3">
                <div class="col-6">
                    <div class="border-0 rounded-3 p-3 shadow-sm" style="background: linear-gradient(135deg, #ffffff, #f8f9fa);">
                        <i class="bi bi-clock text-success" style="font-size: 2rem;"></i>
                        <p class="mb-0 mt-2 small fw-semibold">Быстрая проверка</p>
                    </div>
                </div>
                <div class="col-6">
                    <div class="border-0 rounded-3 p-3 shadow-sm" style="background: linear-gradient(135deg, #ffffff, #f8f9fa);">
                        <i class="bi bi-shield-check text-success" style="font-size: 2rem;"></i>
                        <p class="mb-0 mt-2 small fw-semibold">Безопасно</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
