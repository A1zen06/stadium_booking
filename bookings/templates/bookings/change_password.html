{% extends 'bookings/base.html' %}

{% block title %}Смена пароля{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm border-0">
            <div class="card-header bg-success text-white border-0 py-3">
                <h5 class="mb-0"><i class="bi bi-key me-2"></i>Смена пароля</h5>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    
                    <div class="mb-3">
                        <label class="form-label">Старый пароль</label>
                        {{ form.old_password }}
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Новый пароль</label>
                        {{ form.new_password1 }}
                        <div class="form-text">Пароль должен содержать не менее 8 символов</div>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Подтверждение пароля</label>
                        {{ form.new_password2 }}
                    </div>
                    
                    <button type="submit" class="btn btn-success w-100">Сменить пароль</button>
                    <a href="{% url 'profile' %}" class="btn btn-outline-secondary w-100 mt-2">Назад</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
